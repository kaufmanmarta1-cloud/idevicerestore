name: Build macOS (Intel)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-macos-intel:
    name: Build on macOS (Intel)
    runs-on: macos-11

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Xcode command line tools
        run: |
          if ! xcode-select -p >/dev/null 2>&1; then
            echo "Xcode CLI tools not found; attempting to install..."
            sudo xcode-select --install || true
          else
            echo "Xcode CLI tools present"
          fi

      - name: Install Homebrew dependencies
        run: |
          set -e
          brew update
          brew install autoconf automake libtool pkg-config gettext openssl@1.1 libzip
          # make openssl available to configure
          export OPENSSL_DIR="$(brew --prefix openssl@1.1)"

      - name: Prepare build (autogen/configure)
        run: |
          set -e
          ./autogen.sh || true

      - name: Configure
        env:
          LDFLAGS: "-L$(brew --prefix openssl@1.1)/lib"
          CPPFLAGS: "-I$(brew --prefix openssl@1.1)/include"
          PKG_CONFIG_PATH: "$(brew --prefix)/opt/openssl@1.1/lib/pkgconfig"
        run: |
          set -e
          ./configure --prefix=/usr/local

      - name: Build
        run: |
          set -e
          make -j$(sysctl -n hw.logicalcpu)

      - name: Install to staging
        run: |
          set -e
          make install DESTDIR=$GITHUB_WORKSPACE/package
          tar -czf package.tar.gz -C $GITHUB_WORKSPACE package || true

      - name: Run self-checks (optional)
        run: |
          set -e || true
          if [ -x "$GITHUB_WORKSPACE/package/usr/local/bin/idevicerestore" ]; then
            $GITHUB_WORKSPACE/package/usr/local/bin/idevicerestore --help | head -n 5 || true
          else
            echo "idevicerestore binary not found in install staging; skipping runtime check"
          fi

      - name: Upload build package
        uses: actions/upload-artifact@v4
        with:
          name: idevicerestore-macos-intel-package
          path: |
            package.tar.gz
