name: Build macOS (Intel) with bundled dependencies

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-macos-intel:
    name: Build on macOS (Intel) and bundle deps
    runs-on: macos-11
    env:
      DEPS_DIR: ${{ github.workspace }}/deps
      SRC_DIR: ${{ github.workspace }}/src
      INSTALL_STAGING: ${{ github.workspace }}/package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Xcode command line tools
        run: |
          if ! xcode-select -p >/dev/null 2>&1; then
            echo "Xcode CLI tools not found; attempting to install..."
            sudo xcode-select --install || true
          else
            echo "Xcode CLI tools present"
          fi

      - name: Install Homebrew build tools
        run: |
          set -e
          brew update
          brew install autoconf automake libtool pkg-config gettext openssl@1.1 libzip
          export PATH="$(brew --prefix)/opt/gettext/bin:$PATH"

      - name: Prepare directories
        run: |
          set -e
          rm -rf "$DEPS_DIR" "$SRC_DIR" "$INSTALL_STAGING"
          mkdir -p "$DEPS_DIR" "$SRC_DIR" "$INSTALL_STAGING"

      - name: Clone and build dependencies into DEPS_DIR
        run: |
          set -e
          cd "$SRC_DIR"

          # Helper to clone, autogen/configure, build, install
          build_repo() {
            repo="$1"
            name="$2"
            git clone --depth 1 "https://github.com/libimobiledevice/${repo}.git" "$name"
            cd "$name"
            if [ -f ./autogen.sh ]; then
              ./autogen.sh
            fi
            # Use local prefix for install
            ./configure --prefix="$DEPS_DIR" \
                        CPPFLAGS="-I${DEPS_DIR}/include -I$(brew --prefix openssl@1.1)/include" \
                        LDFLAGS="-L${DEPS_DIR}/lib -L$(brew --prefix openssl@1.1)/lib" \
                        PKG_CONFIG_PATH="${DEPS_DIR}/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig"
            make -j$(sysctl -n hw.logicalcpu)
            make install
            cd ..
          }

          # Build order matters (libplist first)
          build_repo libplist libplist
          build_repo libimobiledevice-glue libimobiledevice-glue
          build_repo libusbmuxd libusbmuxd
          build_repo libirecovery libirecovery
          build_repo libimobiledevice libimobiledevice
          build_repo libtatsu libtatsu

      - name: Configure & build idevicerestore using local deps
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/deps/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig
          CPPFLAGS: "-I${{ github.workspace }}/deps/include -I$(brew --prefix openssl@1.1)/include"
          LDFLAGS: "-L${{ github.workspace }}/deps/lib -L$(brew --prefix openssl@1.1)/lib"
        run: |
          set -e
          # some releases are from tarball, try autogen then configure
          ./autogen.sh || true
          ./configure --prefix="$DEPS_DIR" \
                      PKG_CONFIG_PATH="$PKG_CONFIG_PATH" \
                      CPPFLAGS="$CPPFLAGS" \
                      LDFLAGS="$LDFLAGS"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      - name: Stage installation for packaging
        run: |
          set -e
          # create a package folder that contains bin/ lib/ include/ relative to root
          rm -rf "$INSTALL_STAGING"
          mkdir -p "$INSTALL_STAGING"
          # copy deps tree (contains bin/, lib/, include/) into staging
          cp -a "$DEPS_DIR"/* "$INSTALL_STAGING" || true
          # For convenience, place idevicerestore under package/usr/local/bin if consumers expect /usr/local layout:
          mkdir -p "$INSTALL_STAGING/usr/local"
          cp -a "$DEPS_DIR"/* "$INSTALL_STAGING/usr/local/" || true
          tar -czf idevicerestore-macos-intel-with-deps.tar.gz -C "$INSTALL_STAGING" .

      - name: Run self-checks using bundled libs
        run: |
          set -e || true
          export DYLD_LIBRARY_PATH="${DEPS_DIR}/lib:${DYLD_LIBRARY_PATH:-}"
          if [ -x "${DEPS_DIR}/bin/idevicerestore" ]; then
            echo "Running idevicerestore --help using DYLD_LIBRARY_PATH=${DEPS_DIR}/lib"
            "${DEPS_DIR}/bin/idevicerestore" --help | head -n 20 || true
          elif [ -x "${INSTALL_STAGING}/usr/local/bin/idevicerestore" ]; then
            "${INSTALL_STAGING}/usr/local/bin/idevicerestore" --help | head -n 20 || true
          else
            echo "idevicerestore binary not found in staging; build may have failed"
            ls -la "${DEPS_DIR}" || true
          fi

      - name: Upload build package
        uses: actions/upload-artifact@v4
        with:
          name: idevicerestore-macos-intel-with-deps
          path: |
            idevicerestore-macos-intel-with-deps.tar.gz
