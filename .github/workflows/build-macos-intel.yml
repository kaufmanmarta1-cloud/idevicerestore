name: Build macOS (Intel) with bundled dependencies

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-macos-intel:
    name: Build on macOS (Intel) and bundle deps
    runs-on: macos-latest
    env:
      DEPS_DIR: ${{ github.workspace }}/deps
      STAGING_PREFIX: ${{ github.workspace }}/package/usr/local
      SRC_DIR: ${{ github.workspace }}/src
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      LIBTATSU_VERSION: "1.0.5"
      LIBTATSU_TAR_URL: "https://github.com/libimobiledevice/libtatsu/releases/download/1.0.5/libtatsu-1.0.5.tar.bz2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Xcode command line tools
        run: |
          if ! xcode-select -p >/dev/null 2>&1; then
            echo "Xcode CLI tools not found; attempting to install..."
            sudo xcode-select --install || true
          else
            echo "Xcode CLI tools present"
          fi

      - name: Determine available OpenSSL and install build tools
        run: |
          set -euo pipefail
          brew update
          brew install autoconf automake libtool pkg-config gettext libzip

          # Try to find available OpenSSL formula
          OPENSSL_FORMULA=""
          for formula in openssl@3 openssl@3.0 openssl@3.5; do
            if brew list "$formula" &>/dev/null 2>&1 || brew search "^${formula}$" &>/dev/null 2>&1; then
              OPENSSL_FORMULA="$formula"
              break
            fi
          done

          if [ -z "$OPENSSL_FORMULA" ]; then
            echo "No Homebrew OpenSSL formula found; will use system OpenSSL"
            BREW_OPENSSL=""
          else
            echo "Installing $OPENSSL_FORMULA"
            brew install "$OPENSSL_FORMULA"
            BREW_OPENSSL="$(brew --prefix "$OPENSSL_FORMULA")"
          fi

          # Export for subsequent steps
          echo "BREW_OPENSSL=$BREW_OPENSSL" >> $GITHUB_ENV
          echo "OPENSSL_FORMULA=$OPENSSL_FORMULA" >> $GITHUB_ENV

          export PATH="$(brew --prefix)/opt/gettext/bin:$PATH"

      - name: Prepare directories
        run: |
          set -euo pipefail
          rm -rf "$DEPS_DIR" "$SRC_DIR" "${{ env.STAGING_PREFIX }}"
          mkdir -p "$DEPS_DIR" "$SRC_DIR" "$(dirname "${{ env.STAGING_PREFIX }}")"

      - name: Download libtatsu release tarball
        run: |
          set -euo pipefail
          cd "$SRC_DIR"
          echo "Downloading libtatsu ${LIBTATSU_VERSION}"
          curl -L "${LIBTATSU_TAR_URL}" -o "libtatsu-${LIBTATSU_VERSION}.tar.bz2"
          tar xjf "libtatsu-${LIBTATSU_VERSION}.tar.bz2"
          echo "Contents of $SRC_DIR:"
          ls -la

      - name: Clone & build libimobiledevice dependencies into DEPS_DIR (with libtatsu from release)
        run: |
          set -euo pipefail
          cd "$SRC_DIR"

          # Setup OpenSSL paths
          if [ -n "${{ env.BREW_OPENSSL }}" ]; then
            OPENSSL_PREFIX="${{ env.BREW_OPENSSL }}"
            CPPFLAGS_OPENSSL="-I${OPENSSL_PREFIX}/include"
            LDFLAGS_OPENSSL="-L${OPENSSL_PREFIX}/lib"
          else
            echo "Using system OpenSSL"
            CPPFLAGS_OPENSSL=""
            LDFLAGS_OPENSSL=""
          fi

          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig${OPENSSL_PREFIX:+:${OPENSSL_PREFIX}/lib/pkgconfig}"
          export MACOSX_DEPLOYMENT_TARGET="${MACOSX_DEPLOYMENT_TARGET}"

          build_repo() {
            repo="$1"
            dir="$2"
            echo "=== Building $repo into $DEPS_DIR ==="
            git clone --depth 1 "https://github.com/libimobiledevice/${repo}.git" "$dir"
            cd "$dir"
            if [ -f "./autogen.sh" ]; then
              echo "Running autogen.sh for $repo"
              ./autogen.sh
            fi
            CPPFLAGS="-I${DEPS_DIR}/include ${CPPFLAGS_OPENSSL}"
            LDFLAGS="-L${DEPS_DIR}/lib ${LDFLAGS_OPENSSL}"
            echo "Configuring $repo with CPPFLAGS=$CPPFLAGS LDFLAGS=$LDFLAGS"
            ./configure --prefix="$DEPS_DIR" \
                        CPPFLAGS="$CPPFLAGS" \
                        LDFLAGS="$LDFLAGS" \
                        PKG_CONFIG_PATH="$PKG_CONFIG_PATH"
            make -j$(sysctl -n hw.logicalcpu)
            make install
            cd ..
          }

          # Build order: libplist -> glue -> libtatsu (from release) -> libusbmuxd -> libirecovery -> libimobiledevice
          build_repo libplist libplist
          build_repo libimobiledevice-glue libimobiledevice-glue

          # Build libtatsu from extracted release source
          echo "=== Building libtatsu from release tarball into $DEPS_DIR ==="
          if [ -d "libtatsu-${LIBTATSU_VERSION}" ]; then
            cd "libtatsu-${LIBTATSU_VERSION}"
          else
            cd libtatsu*
          fi

          # List contents for debugging
          echo "Contents of libtatsu directory:"
          ls -la

          # Try autogen if available, otherwise use pre-built configure
          if [ -f "./autogen.sh" ]; then
            echo "Running autogen.sh..."
            ./autogen.sh
          elif [ ! -f "./configure" ]; then
            echo "ERROR: Neither autogen.sh nor configure found"
            echo "Directory listing:"
            find . -maxdepth 2 -type f | head -30
            exit 1
          fi

          # Now configure and build
          CPPFLAGS="-I${DEPS_DIR}/include ${CPPFLAGS_OPENSSL}"
          LDFLAGS="-L${DEPS_DIR}/lib ${LDFLAGS_OPENSSL}"
          echo "Configuring libtatsu with CPPFLAGS=$CPPFLAGS LDFLAGS=$LDFLAGS"
          ./configure --prefix="$DEPS_DIR" \
                      CPPFLAGS="$CPPFLAGS" \
                      LDFLAGS="$LDFLAGS" \
                      PKG_CONFIG_PATH="$PKG_CONFIG_PATH"
          make -j$(sysctl -n hw.logicalcpu)
          make install
          cd ..

          # verify libtatsu pc was installed
          echo "Verifying libtatsu pkg-config availability..."
          if pkg-config --exists libtatsu-1.0; then
            echo "pkg-config: libtatsu-1.0 found: $(pkg-config --modversion libtatsu-1.0)"
          elif pkg-config --exists libtatsu; then
            echo "pkg-config: libtatsu found: $(pkg-config --modversion libtatsu)"
          else
            echo "WARNING: libtatsu pc file not found in $DEPS_DIR/lib/pkgconfig; listing contents for debugging"
            ls -la "$DEPS_DIR/lib/pkgconfig" || true
          fi

          build_repo libusbmuxd libusbmuxd
          build_repo libirecovery libirecovery

          # For libimobiledevice, if pkg-config doesn't find libtatsu, pass explicit flags
          if pkg-config --exists libtatsu-1.0 || pkg-config --exists libtatsu; then
            echo "Building libimobiledevice normally (pkg-config sees libtatsu)"
            build_repo libimobiledevice libimobiledevice
          else
            echo "pkg-config cannot see libtatsu; using libtatsu_CFLAGS/libtatsu_LIBS fallback when configuring libimobiledevice"
            git clone --depth 1 "https://github.com/libimobiledevice/libimobiledevice.git" libimobiledevice
            cd libimobiledevice
            if [ -f "./autogen.sh" ]; then
              ./autogen.sh
            fi
            CPPFLAGS="-I${DEPS_DIR}/include ${CPPFLAGS_OPENSSL}"
            LDFLAGS="-L${DEPS_DIR}/lib ${LDFLAGS_OPENSSL}"
            libtatsu_CFLAGS="-I${DEPS_DIR}/include"
            libtatsu_LIBS="-L${DEPS_DIR}/lib -ltatsu"
            ./configure --prefix="$DEPS_DIR" \
                        CPPFLAGS="$CPPFLAGS" \
                        LDFLAGS="$LDFLAGS" \
                        PKG_CONFIG_PATH="$PKG_CONFIG_PATH" \
                        libtatsu_CFLAGS="$libtatsu_CFLAGS" \
                        libtatsu_LIBS="$libtatsu_LIBS"
            make -j$(sysctl -n hw.logicalcpu)
            make install
            cd ..
          fi

      - name: Configure & build idevicerestore using local deps
        run: |
          set -euo pipefail
          export MACOSX_DEPLOYMENT_TARGET="${MACOSX_DEPLOYMENT_TARGET}"

          if [ -n "${{ env.BREW_OPENSSL }}" ]; then
            OPENSSL_PREFIX="${{ env.BREW_OPENSSL }}"
            export CPPFLAGS="-I${DEPS_DIR}/include -I${OPENSSL_PREFIX}/include"
            export LDFLAGS="-L${DEPS_DIR}/lib -L${OPENSSL_PREFIX}/lib"
            export PKG_CONFIG_PATH="${DEPS_DIR}/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig:${OPENSSL_PREFIX}/lib/pkgconfig"
          else
            export CPPFLAGS="-I${DEPS_DIR}/include"
            export LDFLAGS="-L${DEPS_DIR}/lib"
            export PKG_CONFIG_PATH="${DEPS_DIR}/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig"
          fi

          echo "Configuring idevicerestore with CPPFLAGS=$CPPFLAGS LDFLAGS=$LDFLAGS PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          ./autogen.sh || true
          ./configure --prefix="$DEPS_DIR" \
                      CPPFLAGS="$CPPFLAGS" \
                      LDFLAGS="$LDFLAGS" \
                      PKG_CONFIG_PATH="$PKG_CONFIG_PATH"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      - name: Stage installation for packaging
        run: |
          set -euo pipefail
          mkdir -p "${{ env.STAGING_PREFIX }}"
          cp -a "${{ env.DEPS_DIR }}/." "${{ env.STAGING_PREFIX }}/" || true
          echo "Staged installation contents:"
          ls -la "${{ env.STAGING_PREFIX }}"

      - name: Fix dylib ids and rpaths so binary uses bundled libs
        run: |
          set -euo pipefail
          PREFIX="${{ env.STAGING_PREFIX }}"
          LIB_DIR="$PREFIX/lib"
          BIN_DIR="$PREFIX/bin"

          if [ ! -d "$PREFIX" ]; then
            echo "Staging prefix not found: $PREFIX"
            exit 1
          fi

          echo "Fixing dylib ids in $LIB_DIR"
          for dylib in "$LIB_DIR"/*.dylib; do
            [ -e "$dylib" ] || continue
            name="$(basename "$dylib")"
            echo "  Setting id: $dylib -> @rpath/$name"
            install_name_tool -id "@rpath/$name" "$dylib"
          done

          targets=()
          if [ -d "$BIN_DIR" ]; then
            for f in "$BIN_DIR"/*; do
              [ -e "$f" ] || continue
              targets+=("$f")
            done
          fi
          for f in "$LIB_DIR"/*.dylib; do
            [ -e "$f" ] || continue
            targets+=("$f")
          done

          echo "Rewriting library references and adding rpath to targets"
          for target in "${targets[@]}"; do
            echo "Processing: $target"
            otool -L "$target" | tail -n +2 | awk '{print $1}' | while read -r lib; do
              [ -z "$lib" ] && continue
              case "$lib" in
                /usr/lib/*|/System/*) ;;
                @rpath/*|@loader_path/*|@executable_path/*) ;;
                *)
                  base="$(basename "$lib")"
                  echo "  Changing $lib -> @rpath/$base"
                  install_name_tool -change "$lib" "@rpath/$base" "$target" || true
                  ;;
              esac
            done
            if ! otool -l "$target" | grep -q '@executable_path/../lib'; then
              echo "  Adding rpath @executable_path/../lib"
              install_name_tool -add_rpath "@executable_path/../lib" "$target" 2>/dev/null || true
            fi
          done

          echo "Verification of dylib references:"
          for target in "${targets[@]}"; do
            [ -e "$target" ] || continue
            echo "---- $target ----"
            otool -L "$target"
          done

      - name: Create tarballs of staged installation and libs-only
        run: |
          set -euo pipefail
          cd "$(dirname "${{ env.STAGING_PREFIX }}")"
          echo "Creating tarball of staged installation..."
          tar -czf "${{ github.workspace }}/idevicerestore-macos-intel-with-deps.tar.gz" "$(basename "${{ env.STAGING_PREFIX }}")"
          
          echo "Creating libs-only tarball..."
          mkdir -p "${{ github.workspace }}/libs-only"
          cp -a "${{ env.STAGING_PREFIX }}/lib" "${{ github.workspace }}/libs-only/" || true
          tar -czf "${{ github.workspace }}/idevicerestore-libs-only.tar.gz" -C "${{ github.workspace }}/libs-only" lib

          echo "Tarballs created:"
          ls -lh "${{ github.workspace }}"/*.tar.gz

      - name: Run self-checks using bundled libs (optional)
        run: |
          set -euo pipefail
          BIN="${{ env.STAGING_PREFIX }}/bin/idevicerestore"
          if [ -x "$BIN" ]; then
            export DYLD_LIBRARY_PATH="${{ env.STAGING_PREFIX }}/lib:${DYLD_LIBRARY_PATH:-}"
            echo "Running $BIN --help with DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH"
            "$BIN" --help | head -n 20 || true
          else
            echo "Binary not found at $BIN; skipping runtime check"
            ls -la "${{ env.STAGING_PREFIX }}" || true
          fi

      - name: Upload build packages
        uses: actions/upload-artifact@v4
        with:
          name: idevicerestore-macos-intel-with-deps
          path: |
            idevicerestore-macos-intel-with-deps.tar.gz
            idevicerestore-libs-only.tar.gz
